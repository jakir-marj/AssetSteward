version: '3.8'

services:
  app:
    # Use JDK image directly instead of building a jar for hot reloading
    image: eclipse-temurin:17-jdk-jammy
    working_dir: /app
    volumes:
      - ./:/app
      - gradle_cache:/root/.gradle
    command: ./gradlew bootRun
    container_name: assetsteward_app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=assetdb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: assetsteward_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=assetdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data:
  gradle_cache:

networks:
  app-network:
    driver: bridge
